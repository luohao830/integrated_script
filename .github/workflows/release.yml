name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-artifacts.yml
    secrets: inherit

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist

    - name: Generate release notes
      env:
        TAG: ${{ github.ref_name }}
        REPO: ${{ github.repository }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        python - <<'PY'
        import json
        import os
        import re
        import subprocess
        import urllib.request
        from datetime import datetime, timedelta

        tag = os.environ.get("TAG", "").strip()
        repo = os.environ.get("REPO", "").strip()
        token = os.environ.get("GITHUB_TOKEN", "").strip()

        overview_start_marker = "<!-- release-overview:start -->"
        overview_end_marker = "<!-- release-overview:end -->"

        def run(*args: str) -> str:
          return subprocess.check_output(
            list(args),
            text=True,
            encoding="utf-8",
            errors="replace",
          ).strip()

        def get_prev_release_tag(repo_name: str, current_tag: str, gh_token: str):
          if not repo_name or not gh_token:
            return None
          url = f"https://api.github.com/repos/{repo_name}/releases?per_page=50"
          req = urllib.request.Request(
            url,
            headers={
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {gh_token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "release-notes-generator",
            },
          )
          try:
            with urllib.request.urlopen(req, timeout=15) as resp:
              data = json.load(resp)
          except Exception:
            return None
          if not isinstance(data, list):
            return None
          for rel in data:
            if not isinstance(rel, dict):
              continue
            if rel.get("draft"):
              continue
            tag_name = (rel.get("tag_name") or "").strip()
            if not tag_name or tag_name == current_tag:
              continue
            return tag_name
          return None

        def extract_release_overview_from_tag(tag_name: str):
          if not tag_name:
            return ""
          try:
            annotation = run("git", "for-each-ref", f"refs/tags/{tag_name}", "--format=%(contents)")
          except Exception:
            return ""
          if not annotation:
            return ""

          start_index = annotation.find(overview_start_marker)
          end_index = annotation.find(overview_end_marker)
          if start_index < 0 or end_index < 0 or end_index <= start_index:
            return ""

          content_start = start_index + len(overview_start_marker)
          return annotation[content_start:end_index].strip()

        prev = None
        prev_release = get_prev_release_tag(repo, tag, token)
        if prev_release:
          prev = prev_release

        try:
          merged_tags = run(
            "git",
            "tag",
            "--merged",
            tag,
            "--list",
            "v[0-9]*.[0-9]*.[0-9]*",
            "--sort=version:refname",
          ).splitlines()
        except Exception:
          merged_tags = []

        if not prev and tag and merged_tags:
          try:
            idx = merged_tags.index(tag)
          except ValueError:
            idx = -1
          if idx > 0:
            prev = merged_tags[idx - 1]

        rev_range = f"{prev}..{tag}" if prev else tag
        raw = run(
          "git",
          "log",
          "--no-merges",
          "--pretty=format:%s|%h",
          rev_range,
        )
        lines = [ln for ln in raw.splitlines() if ln.strip()]

        categories = {
          "新增": [],
          "修复": [],
          "文档": [],
          "CI/构建": [],
          "重构": [],
          "测试": [],
          "其他": [],
        }

        type_re = re.compile(r"^(?P<type>\\w+)(?:\\((?P<scope>[^)]+)\\))?:\\s*(?P<msg>.+)$")

        for ln in lines:
          subject, sha = ln.rsplit("|", 1)
          subject = subject.strip()
          sha = sha.strip()
          lower = subject.lower()
          m = type_re.match(subject)
          if m:
            msg = m.group("msg").strip()
            scope = (m.group("scope") or "").strip()
            display = f"{msg} ({scope})" if scope else msg
            t = m.group("type").lower()
          else:
            display = subject
            t = lower.split(":", 1)[0]

          if t.startswith("feat"):
            categories["新增"].append((display, sha))
          elif t.startswith("fix"):
            categories["修复"].append((display, sha))
          elif t.startswith("docs"):
            categories["文档"].append((display, sha))
          elif t.startswith("ci"):
            categories["CI/构建"].append((display, sha))
          elif t.startswith("refactor"):
            categories["重构"].append((display, sha))
          elif t.startswith("test"):
            categories["测试"].append((display, sha))
          else:
            categories["其他"].append((display, sha))

        def format_section(title: str, items: list[tuple[str, str]]) -> str:
          if not items:
            return ""
          section_lines = [f"## {title}", ""]
          for subject, sha in items:
            section_lines.append(f"- {subject} ({sha})")
          section_lines.append("")
          return "\n".join(section_lines)

        release_overview = extract_release_overview_from_tag(tag)

        body = []
        body.append(f"# {tag}")
        body.append("")
        if prev:
          body.append(f"对比范围：{prev} → {tag}")
          if repo:
            body.append(
              f"完整对比：https://github.com/{repo}/compare/{prev}...{tag}"
            )
        else:
          body.append("对比范围：初始发布")
        body.append("")

        if release_overview:
          body.append(release_overview)
          body.append("")

        for section in ("新增", "修复", "文档", "CI/构建", "重构", "测试", "其他"):
          part = format_section(section, categories[section])
          if part:
            body.append(part)
        if not any(categories.values()):
          body.append("本次没有可展示的提交记录。")
          body.append("")
        utc8 = datetime.utcnow().replace(microsecond=0) + timedelta(hours=8)
        body.append(f"生成时间：{utc8.strftime('%Y-%m-%d %H:%M')} 北京时间")
        body.append("")

        with open("release_body.md", "w", encoding="utf-8") as f:
          f.write("\n".join(body))
        PY
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/windows-amd64/integrated_script-${{ github.ref_name }}-windows-amd64.exe
          dist/linux-amd64/integrated_script-${{ github.ref_name }}-linux-amd64
          dist/linux-arm64/integrated_script-${{ github.ref_name }}-linux-arm64
        body_path: release_body.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
