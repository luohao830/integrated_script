name: Release Orchestrator

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "版本级别模式（auto/force）"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - force
      version_type:
        description: "版本级别（major/minor/patch；mode=force 时必填）"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      overview_markdown:
        description: "发布概况 markdown（建议以 ## 发布概况 开头）"
        required: true
        type: string
      note:
        description: "可选备注（会追加到 tag 注释）"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-orchestrator-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  orchestrate:
    name: Version bump, tag and push
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Configure git identity
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Validate inputs and build release annotation
      id: inputs
      env:
        MODE: ${{ github.event.inputs.mode }}
        VERSION_TYPE: ${{ github.event.inputs.version_type }}
        OVERVIEW_MARKDOWN: ${{ github.event.inputs.overview_markdown }}
        NOTE: ${{ github.event.inputs.note }}
      run: |
        python - <<'PY'
        import os
        from pathlib import Path

        mode = (os.environ.get("MODE") or "auto").strip().lower()
        version_type = (os.environ.get("VERSION_TYPE") or "").strip().lower()
        overview = (os.environ.get("OVERVIEW_MARKDOWN") or "").strip()
        note = (os.environ.get("NOTE") or "").strip()

        if mode not in {"auto", "force"}:
            raise SystemExit("mode 仅支持 auto/force")

        if not overview:
            raise SystemExit("overview_markdown 不能为空")

        if not overview.startswith("## 发布概况"):
            raise SystemExit("overview_markdown 必须以 '## 发布概况' 开头")

        if mode == "force":
            if version_type not in {"major", "minor", "patch"}:
                raise SystemExit("mode=force 时 version_type 必须是 major/minor/patch")
        else:
            if version_type not in {"major", "minor", "patch"}:
                version_type = "patch"

        annotation_lines = []
        if note:
            annotation_lines.append(note)
            annotation_lines.append("")

        annotation_lines.append("<!-- release-overview:start -->")
        annotation_lines.append(overview)
        annotation_lines.append("<!-- release-overview:end -->")
        annotation = "\n".join(annotation_lines)

        output_file = Path(os.environ["GITHUB_OUTPUT"])
        with output_file.open("a", encoding="utf-8") as fh:
            fh.write(f"version_type={version_type}\n")
            fh.write("annotation<<EOF\n")
            fh.write(annotation)
            fh.write("\nEOF\n")
        PY

    - name: Ensure target branch is up to date
      run: |
        git fetch origin "${GITHUB_REF_NAME}"
        git checkout "${GITHUB_REF_NAME}"
        git reset --hard "origin/${GITHUB_REF_NAME}"

    - name: Bump version, commit and create tag
      id: bump
      env:
        RELEASE_TYPE: ${{ steps.inputs.outputs.version_type }}
        RELEASE_ANNOTATION: ${{ steps.inputs.outputs.annotation }}
      run: |
        python - <<'PY'
        import os
        import subprocess
        import sys
        from pathlib import Path

        repo_root = Path.cwd()
        scripts_path = repo_root / "scripts"
        if str(scripts_path) not in sys.path:
            sys.path.insert(0, str(scripts_path))

        from version_manager import VersionManager

        release_type = os.environ["RELEASE_TYPE"]
        annotation = os.environ["RELEASE_ANNOTATION"]

        vm = VersionManager(project_root=repo_root)
        new_version = vm.release(release_type, annotation)

        output_file = Path(os.environ["GITHUB_OUTPUT"])
        with output_file.open("a", encoding="utf-8") as fh:
            fh.write(f"version={new_version}\n")
            fh.write(f"tag=v{new_version}\n")

        subprocess.run(["git", "status", "--short"], check=True)
        PY

    - name: Push branch and tag
      env:
        TAG_NAME: ${{ steps.bump.outputs.tag }}
      run: |
        git push origin "${GITHUB_REF_NAME}"
        git push origin "${TAG_NAME}"

    - name: Summary
      env:
        RELEASE_TYPE: ${{ steps.inputs.outputs.version_type }}
        RELEASE_VERSION: ${{ steps.bump.outputs.version }}
        RELEASE_TAG: ${{ steps.bump.outputs.tag }}
      run: |
        echo "Release type: ${RELEASE_TYPE}"
        echo "Version: ${RELEASE_VERSION}"
        echo "Tag: ${RELEASE_TAG}"
